<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>布局示例 - 卡片展示</title>
    <style>
        /* 整a体容器 */
        .container {
            max-width: 1200px;
            margin: 0 auto;      /* 水平居中 */
            padding: 20px;
        }

        /* 标题栏用 Flex */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid #ddd;
            padding-bottom: 10px;
            margin-bottom: 30px;
        }
        .nav-links a {
            margin-left: 20px;
            text-decoration: none;
            color: #2c7a64;
        }

        /* 卡片网格：用 Grid 实现响应式卡片布局 */
        .card-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 24px;
        }

        /* 单个卡片样式 */
        .card {
            border: 1px solid #e2e8f0;
            border-radius: 16px;
            padding: 16px;
            background: white;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .card:hover {
            transform: translateY(-4px);
            box-shadow: 0 12px 20px -10px rgba(0,0,0,0.1);
        }
        .card h3 {
            margin: 0 0 8px 0;
            color: #0f172a;
        }
        .card p {
            color: #475569;
            line-height: 1.4;
            margin: 0 0 16px 0;
        }
        .btn {
            display: inline-block;
            background: #2c7a64;
            color: white;
            padding: 6px 14px;
            border-radius: 30px;
            text-decoration: none;
            font-size: 0.85rem;
        }
    </style>
</head>
<body style="background: #f4f6f9; margin: 0;">
    <div class="container">
        <!-- 头部 Flex 布局 -->
        <div class="header">
            <h2>🎨 设计画廊</h2>
            <div class="nav-links">
                <a href="#">鸟鸟</a>
                <a href="helpTheBird/index.html">救援</a>
            </div>
        </div>

        <!-- 卡片网格 Grid 布局 -->
        <div class="card-grid">
            <div class="card">
                <h3>倡议救援</h3>
                <p>虽然没有，但是保护动物</p>
                <a href="helpTheBird/index.html" class="btn">查看网页 →</a>
            </div>
            <div class="card">
                <h3>植物大战僵尸模组版</h3>
                <p>底层由我的世界的java编写，但是没有开发完成，属于半成品</p>
                <a href="PvzMod/index.html" class="btn">查看网页 →</a>
            </div>
            <div class="card">
                <h3>电商产品</h3>
                <p>商品网格，hover微动效，提升用户浏览体验。</p>
                <a href="#" class="btn">查看网页 →</a>
            </div>
            <div class="card">
                <h3>个人名片</h3>
                <p>利用flex居中，头像和介绍信息优雅展示。</p>
                <a href="#" class="btn">查看网页 →</a>
            </div>
        </div>
    </div>
</body>
</html>

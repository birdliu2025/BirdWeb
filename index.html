<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>液态玻璃按钮 - iOS风格增强版</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            min-height: 100vh;
            background: radial-gradient(ellipse at 40% 30%, #101a24, #03060a);
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: system-ui, -apple-system, 'SF Pro Text', 'Helvetica Neue', 'Segoe UI', BlinkMacSystemFont, sans-serif;
            padding: 1.5rem;
        }

        /* 主容器 - 更优雅的排列 */
        .glass-container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            align-items: center;
            gap: 2.5rem;
            perspective: 800px;
        }

        /* ==============================================
           液态玻璃按钮核心设计 (重新构思更惊艳的液体质感)
           ============================================== */
        .liquid-btn {
            position: relative;
            width: 280px;
            height: 84px;
            border-radius: 100px;
            background: transparent;
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.55rem;
            font-weight: 590;
            letter-spacing: 0.8px;
            transition: transform 0.25s cubic-bezier(0.2, 0.95, 0.4, 1.05), filter 0.3s;
            will-change: transform;
            overflow: hidden;
            /* 保证内部子元素圆角裁剪 */
        }

        /* 玻璃基底层 - 增强的液态玻璃模糊 + 内高光 + 外阴影 */
        .liquid-btn__base {
            position: absolute;
            inset: 0;
            border-radius: inherit;
            background: linear-gradient(135deg, rgba(140, 170, 210, 0.25) 0%, rgba(80, 110, 150, 0.35) 100%);
            backdrop-filter: blur(16px) saturate(180%);
            -webkit-backdrop-filter: blur(16px) saturate(180%);
            border: 1px solid rgba(255, 255, 255, 0.45);
            border-top-color: rgba(255, 255, 255, 0.7);
            border-bottom-color: rgba(255, 255, 255, 0.15);
            box-shadow: 0 15px 30px -8px rgba(0, 0, 0, 0.3), inset 0 1px 1px rgba(255, 255, 255, 0.5), inset 0 -2px 0 rgba(0, 0, 0, 0.05);
            transition: all 0.3s ease;
            z-index: 0;
        }

        /* 液态高光层1 - 模拟液体表面流动的高光 (有机形态) */
        .liquid-btn__gloss {
            position: absolute;
            inset: 0;
            border-radius: inherit;
            background: radial-gradient(ellipse at 30% 25%, rgba(255, 255, 245, 0.5) 0%, rgba(255, 255, 255, 0.08) 60%);
            opacity: 0.7;
            z-index: 1;
            pointer-events: none;
            mix-blend-mode: overlay;
            transition: all 0.4s;
            transform: translateX(-2%) translateY(-3%);
            filter: blur(3px);
        }

        /* 液态高光层2 - 动态流体波纹 (类似水滴扩散感) */
        .liquid-btn__ripple {
            position: absolute;
            inset: 0;
            border-radius: inherit;
            background: radial-gradient(circle at 70% 55%, rgba(200, 225, 255, 0.4) 0%, rgba(100, 150, 210, 0) 75%);
            opacity: 0.55;
            z-index: 1;
            pointer-events: none;
            mix-blend-mode: soft-light;
            transition: transform 0.5s cubic-bezier(0.2, 0.9, 0.3, 1.1);
        }

        /* 高级液态纹理层: 增加流动的斜向光线，更像玻璃内部折射 */
        .liquid-btn__sheen {
            position: absolute;
            top: -20%;
            left: -30%;
            width: 160%;
            height: 160%;
            background: linear-gradient(115deg, 
                        rgba(255, 255, 255, 0) 20%,
                        rgba(255, 255, 255, 0.3) 45%,
                        rgba(255, 255, 255, 0.6) 50%,
                        rgba(255, 255, 255, 0.3) 55%,
                        rgba(255, 255, 255, 0) 80%);
            transform: rotate(25deg);
            opacity: 0.35;
            pointer-events: none;
            z-index: 2;
            filter: blur(5px);
            transition: transform 0.6s;
        }

        /* 按钮文字层 (精致渐变文字 + 轻微阴影) */
        .liquid-btn__text {
            position: relative;
            z-index: 5;
            background: linear-gradient(135deg, #FFFFFF 30%, #EAF3FF 80%);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.2);
            font-weight: 600;
            transition: all 0.2s;
            letter-spacing: 1px;
        }

        /* 额外微光边缘增强液态玻璃感 */
        .liquid-btn__edge {
            position: absolute;
            inset: 0;
            border-radius: inherit;
            box-shadow: inset 0 0 10px rgba(255, 255, 255, 0.3), 0 0 0 1px rgba(255, 255, 255, 0.2);
            pointer-events: none;
            z-index: 3;
            opacity: 0.6;
        }

        /* 动态漂浮动画: 让高光缓慢流动 (模拟液体表面波动) */
        @keyframes floatLiquid {
            0% {
                transform: translateX(-3%) translateY(-2%) rotate(0deg);
            }
            50% {
                transform: translateX(3%) translateY(2%) rotate(1deg);
            }
            100% {
                transform: translateX(-3%) translateY(-2%) rotate(0deg);
            }
        }
        
        @keyframes sheenSlide {
            0% {
                transform: rotate(25deg) translateX(-5%) translateY(-10%);
            }
            100% {
                transform: rotate(25deg) translateX(5%) translateY(10%);
            }
        }

        .liquid-btn__gloss {
            animation: floatLiquid 7s infinite ease-in-out;
        }
        
        .liquid-btn__sheen {
            animation: sheenSlide 9s infinite alternate ease-in-out;
        }

        /* 悬停交互提升液态反应 */
        @media (hover: hover) {
            .liquid-btn:hover {
                transform: translateY(-4px) scale(1.02);
                filter: drop-shadow(0 12px 20px rgba(0, 0, 0, 0.25));
            }
            .liquid-btn:hover .liquid-btn__base {
                background: linear-gradient(135deg, rgba(160, 190, 230, 0.32) 0%, rgba(100, 130, 180, 0.4) 100%);
                backdrop-filter: blur(20px) saturate(200%);
                border-color: rgba(255, 255, 255, 0.65);
                box-shadow: 0 20px 35px -10px rgba(0, 0, 0, 0.35), inset 0 1px 2px rgba(255, 255, 255, 0.7);
            }
            .liquid-btn:hover .liquid-btn__gloss {
                opacity: 0.9;
                filter: blur(2px);
            }
            .liquid-btn:hover .liquid-btn__ripple {
                opacity: 0.8;
                background: radial-gradient(circle at 65% 45%, rgba(220, 240, 255, 0.55) 0%, rgba(140, 190, 250, 0.1) 85%);
            }
            .liquid-btn:hover .liquid-btn__text {
                background: linear-gradient(135deg, #FFFFFF, #FFFFFF);
                -webkit-background-clip: text;
                background-clip: text;
                text-shadow: 0 0 6px rgba(255, 255, 255, 0.5);
            }
        }

        /* 按压状态 - 液态受压力形变 + 内陷光感 */
        .liquid-btn:active {
            transform: scale(0.96);
            transition: transform 0.08s cubic-bezier(0.2, 0.9, 0.5, 1);
        }
        .liquid-btn:active .liquid-btn__base {
            background: linear-gradient(135deg, rgba(100, 130, 170, 0.45) 0%, rgba(70, 95, 130, 0.5) 100%);
            backdrop-filter: blur(12px) saturate(170%);
            box-shadow: inset 0 2px 6px rgba(0, 0, 0, 0.25), 0 5px 12px rgba(0, 0, 0, 0.2);
            border-top-color: rgba(255, 255, 255, 0.4);
        }
        .liquid-btn:active .liquid-btn__gloss {
            opacity: 0.5;
            transform: translateX(2%) translateY(3%) scale(0.98);
            filter: blur(5px);
        }
        .liquid-btn:active .liquid-btn__ripple {
            opacity: 0.4;
            transform: scale(0.97);
        }

        /* 不同风格变体 - 紫罗兰液态玻璃 */
        .liquid-btn--violet .liquid-btn__base {
            background: linear-gradient(135deg, rgba(175, 140, 210, 0.28) 0%, rgba(120, 85, 165, 0.38) 100%);
            border-color: rgba(220, 190, 255, 0.45);
        }
        .liquid-btn--violet .liquid-btn__text {
            background: linear-gradient(135deg, #F3EFFF, #E0CDFF);
            -webkit-background-clip: text;
            background-clip: text;
        }
        @media (hover: hover) {
            .liquid-btn--violet:hover .liquid-btn__base {
                background: linear-gradient(135deg, rgba(190, 155, 230, 0.35) 0%, rgba(135, 100, 185, 0.45) 100%);
                border-color: rgba(235, 210, 255, 0.65);
            }
        }

        /* 风格 - 深海翡翠色液态玻璃 */
        .liquid-btn--emerald .liquid-btn__base {
            background: linear-gradient(135deg, rgba(80, 170, 150, 0.28) 0%, rgba(40, 120, 110, 0.38) 100%);
            border-color: rgba(130, 220, 200, 0.45);
        }
        .liquid-btn--emerald .liquid-btn__text {
            background: linear-gradient(135deg, #D4FFEF, #A0F0DA);
            -webkit-background-clip: text;
            background-clip: text;
        }

        /* 高级点击水波纹效果（液态溅射感）*/
        .liquid-splash {
            position: absolute;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(255, 255, 255, 0.9) 0%, rgba(210, 230, 255, 0.3) 80%);
            filter: blur(6px);
            pointer-events: none;
            z-index: 20;
            transform: scale(0);
            opacity: 0.9;
            animation: splashAnim 0.6s cubic-bezier(0.2, 0.9, 0.4, 1) forwards;
        }

        @keyframes splashAnim {
            0% {
                transform: scale(0);
                opacity: 0.9;
            }
            40% {
                opacity: 0.7;
            }
            100% {
                transform: scale(4.5);
                opacity: 0;
            }
        }

        /* 额外增加光晕脉冲 (模拟液态压力波) */
        .liquid-pulse {
            position: absolute;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(255, 240, 180, 0.7) 0%, rgba(255, 200, 100, 0) 80%);
            filter: blur(8px);
            pointer-events: none;
            z-index: 19;
            animation: pulseAnim 0.4s ease-out forwards;
        }

        @keyframes pulseAnim {
            0% {
                transform: scale(0.2);
                opacity: 0.8;
            }
            100% {
                transform: scale(2.2);
                opacity: 0;
            }
        }

        /* 微响应式 */
        @media (max-width: 680px) {
            .liquid-btn {
                width: 240px;
                height: 74px;
                font-size: 1.35rem;
            }
            .glass-container {
                gap: 1.8rem;
            }
        }

        /* 全局底部说明 */
        .info-badge {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(20, 30, 45, 0.6);
            backdrop-filter: blur(20px);
            border-radius: 40px;
            padding: 6px 18px;
            font-size: 0.8rem;
            color: #cdedff;
            font-family: monospace;
            letter-spacing: 1px;
            border: 0.5px solid rgba(255, 255, 255, 0.25);
            pointer-events: none;
            z-index: 100;
            white-space: nowrap;
        }

        /* 降级处理 backdrop-filter 不支持 */
        @supports not (backdrop-filter: blur(10px)) {
            .liquid-btn__base {
                background: rgba(70, 100, 140, 0.75) !important;
                backdrop-filter: none !important;
            }
            .liquid-btn--violet .liquid-btn__base {
                background: rgba(115, 85, 150, 0.8) !important;
            }
            .liquid-btn--emerald .liquid-btn__base {
                background: rgba(55, 125, 110, 0.8) !important;
            }
        }
    </style>
</head>
<body>

<div class="glass-container">
    <!-- 按钮 1: 经典蓝调液态玻璃 -->
    <button class="liquid-btn" id="btnPrimary">
        <div class="liquid-btn__base"></div>
        <div class="liquid-btn__gloss"></div>
        <div class="liquid-btn__ripple"></div>
        <div class="liquid-btn__sheen"></div>
        <div class="liquid-btn__edge"></div>
        <span class="liquid-btn__text">液态玻璃</span>
    </button>

    <!-- 按钮 2: 紫罗兰流光 -->
    <button class="liquid-btn liquid-btn--violet" id="btnViolet">
        <div class="liquid-btn__base"></div>
        <div class="liquid-btn__gloss"></div>
        <div class="liquid-btn__ripple"></div>
        <div class="liquid-btn__sheen"></div>
        <div class="liquid-btn__edge"></div>
        <span class="liquid-btn__text">紫晶水漾</span>
    </button>

    <!-- 按钮 3: 翡翠深澜 -->
    <button class="liquid-btn liquid-btn--emerald" id="btnEmerald">
        <div class="liquid-btn__base"></div>
        <div class="liquid-btn__gloss"></div>
        <div class="liquid-btn__ripple"></div>
        <div class="liquid-btn__sheen"></div>
        <div class="liquid-btn__edge"></div>
        <span class="liquid-btn__text">翡翠凝露</span>
    </button>
</div>
<div class="info-badge">
    💧 液态玻璃 · 灵动按压涟漪
</div>

<script>
    (function() {
        // 高级液体效果: 生成按压时 水花溅射 + 脉冲光晕 (提升液态玻璃触感)
        
        // 创建涟漪溅射效果 (模仿指尖触碰液体散开的感觉)
        function createLiquidSplash(event, btnElement) {
            // 获取准确的点击坐标
            const rect = btnElement.getBoundingClientRect();
            let clientX, clientY;
            
            if (event.touches) {
                // 移动端触摸
                clientX = event.touches[0].clientX;
                clientY = event.touches[0].clientY;
            } else {
                clientX = event.clientX;
                clientY = event.clientY;
            }
            
            const x = clientX - rect.left;
            const y = clientY - rect.top;
            
            // 边界限制，超出不产生效果，但仍然防止误判
            if (x < -20 || x > rect.width + 20 || y < -20 || y > rect.height + 20) return;
            
            // 确保坐标在合理范围内
            const relX = Math.min(Math.max(x, 0), rect.width);
            const relY = Math.min(Math.max(y, 0), rect.height);
            
            // === 水滴飞溅效果 ===
            const splash = document.createElement('div');
            splash.className = 'liquid-splash';
            const size = Math.min(rect.width, rect.height) * 0.4;
            splash.style.width = `${size}px`;
            splash.style.height = `${size}px`;
            splash.style.left = `${relX - size/2}px`;
            splash.style.top = `${relY - size/2}px`;
            splash.style.position = 'absolute';
            splash.style.borderRadius = '50%';
            splash.style.background = `radial-gradient(circle, rgba(255, 255, 245, 0.85) 0%, rgba(170, 210, 255, 0.4) 70%)`;
            splash.style.filter = 'blur(5px)';
            splash.style.pointerEvents = 'none';
            splash.style.zIndex = '22';
            btnElement.style.overflow = 'visible';
            btnElement.appendChild(splash);
            
            // 脉冲光晕加强液态爆发感
            const pulse = document.createElement('div');
            pulse.className = 'liquid-pulse';
            const pulseSize = Math.min(rect.width, rect.height) * 0.28;
            pulse.style.width = `${pulseSize}px`;
            pulse.style.height = `${pulseSize}px`;
            pulse.style.left = `${relX - pulseSize/2}px`;
            pulse.style.top = `${relY - pulseSize/2}px`;
            pulse.style.position = 'absolute';
            pulse.style.background = 'radial-gradient(circle, rgba(255, 220, 140, 0.8), rgba(255, 180, 80, 0.2))';
            pulse.style.filter = 'blur(7px)';
            pulse.style.zIndex = '21';
            btnElement.appendChild(pulse);
            
            // 移除元素并恢复 overflow (若没有其他动画元素时)
            const removeEffects = () => {
                splash.remove();
                pulse.remove();
                if (btnElement.querySelectorAll('.liquid-splash, .liquid-pulse').length === 0) {
                    // 恢复原始的 overflow，但按钮原本 overflow hidden 最好复原
                    btnElement.style.overflow = '';
                }
            };
            
            splash.addEventListener('animationend', removeEffects);
            pulse.addEventListener('animationend', () => {
                // 确保 pulse 移除，但可能 splash 先移除，单独处理即可
                if (pulse.parentNode) pulse.remove();
            });
            
            // 额外备选: 如果动画未触发 超时移除
            setTimeout(() => {
                if (splash.parentNode) splash.remove();
                if (pulse.parentNode) pulse.remove();
                if (btnElement.querySelectorAll('.liquid-splash, .liquid-pulse').length === 0) {
                    btnElement.style.overflow = '';
                }
            }, 700);
        }
        
        // 给按钮添加交互：鼠标/触摸产生液态波纹特效
        const buttons = document.querySelectorAll('.liquid-btn');
        
        function attachRippleEvents(btn) {
            // 鼠标/指针事件
            btn.addEventListener('mousedown', (e) => {
                createLiquidSplash(e, btn);
                // 轻微触感反馈可选 (增加高级感)
                if (window.navigator && window.navigator.vibrate && e.button === 0) {
                    // 轻反馈，不影响体验，仅支持支持振动的设备
                    try { window.navigator.vibrate(8); } catch(e) {}
                }
            });
            
            // 移动端触摸
            btn.addEventListener('touchstart', (e) => {
                // 阻止轻微滚动避免页面滚动时同时触发不自然，但为了性能，只产生效果不 preventDefault（保留滚动）
                if (e.cancelable) {
                    // 不 preventDefault 保留原生滚动，但对按钮涟漪没有影响
                }
                createLiquidSplash(e, btn);
                try {
                    if (window.navigator && window.navigator.vibrate) window.navigator.vibrate(6);
                } catch(e) {}
            }, { passive: false });
            
            // 增加click时控制台演示(不干扰) 
            btn.addEventListener('click', (e) => {
                const textSpan = btn.querySelector('.liquid-btn__text');
                const btnName = textSpan ? textSpan.innerText : '按钮';
                console.log(`✨ 液态玻璃按钮 [${btnName}] 触发，灵动水漾质感 ✨`);
            });
        }
        
        buttons.forEach(btn => attachRippleEvents(btn));
        
        // 添加额外动态悬停/离开模拟强化液态流动（与CSS结合）
        // 针对每个按钮，鼠标移动时根据鼠标位置改变高光微偏移（可选高级效果）
        // 增强: 鼠标移动时光泽跟随 (液态磁吸感)
        function addMagneticGloss(btn) {
            const glossLayer = btn.querySelector('.liquid-btn__gloss');
            const rippleLayer = btn.querySelector('.liquid-btn__ripple');
            if (!glossLayer) return;
            
            btn.addEventListener('mousemove', (e) => {
                const rect = btn.getBoundingClientRect();
                const x = (e.clientX - rect.left) / rect.width;  // 0-1 范围
                const y = (e.clientY - rect.top) / rect.height;
                // 让高光轻微跟随鼠标方向移动，更液态智能感
                const moveX = (x - 0.5) * 12;
                const moveY = (y - 0.5) * 8;
                glossLayer.style.transform = `translateX(${moveX}%) translateY(${moveY}%)`;
                if (rippleLayer) {
                    // 同时让波纹层放射中心跟随
                    rippleLayer.style.background = `radial-gradient(circle at ${x * 100}% ${y * 100}%, rgba(220, 240, 255, 0.5) 0%, rgba(100, 150, 210, 0.08) 75%)`;
                }
            });
            
            btn.addEventListener('mouseleave', () => {
                glossLayer.style.transform = '';
                if (rippleLayer) {
                    rippleLayer.style.background = '';
                }
            });
        }
        
        buttons.forEach(btn => addMagneticGloss(btn));
        
        // 针对移动端的触摸移动取消跟随效果，避免性能开销，不处理即可。
        // 额外确保 iOS 上按钮点击无闪白（已通过 css 处理）
        
        // 让 .liquid-btn__sheen 偶尔改变方向增加液态流动感 (已经用动画)
        // 并且增加初始化自适应: 如果用户偏好减少动画，降低动画性能
        const mediaQuery = window.matchMedia('(prefers-reduced-motion: reduce)');
        if (mediaQuery.matches) {
            const styleSheet = document.createElement('style');
            styleSheet.textContent = `
                .liquid-btn__gloss, .liquid-btn__sheen {
                    animation: none !important;
                    transition: none !important;
                }
            `;
            document.head.appendChild(styleSheet);
        }
        
        // 辅助特性: 视差光晕重置及防抖
        let resizeTimer;
        window.addEventListener('resize', () => {
            if (resizeTimer) clearTimeout(resizeTimer);
            resizeTimer = setTimeout(() => {
                // 重新校正可能偏移，什么都不用做
            }, 100);
        });
        
        // 添加入场时的小惊喜: 模拟水波呼吸效果 (只在初次加载时轻微显示)
        setTimeout(() => {
            buttons.forEach((btn, idx) => {
                btn.style.transition = 'transform 0.3s';
                btn.style.transform = 'scale(1.02)';
                setTimeout(() => {
                    btn.style.transform = '';
                }, 200 + idx * 80);
            });
        }, 100);
    })();
</script>
</body>
</html>

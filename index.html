<html>

                margin-left: var(--mar-left);

            }
        </style>

    <body>
        <audio id="mp3" src="Bad_to_the_bone.mp3" autoplay></audio>
        <div style="min-width: 14px;height: 50px;background-color: #f9f9f9;margin-top:10px;border-radius: 10px;margin-left: 14xp;box-shadow: 5px 5px 14px gray;">

            <img src="bigdan.png" style="width: 10px;height: 10px;" class="shars">
        </div>
        <button class="control-btn play-btn" id="playBtn" style="position: fixed;" onclick="music()">
            <i class="fas fa-play" id="playIcon" style="width: 10px;"></i>
            <img src="我坏到骨子里😡.png" style="width: 70px;">
        </button>

        
        <script>
        let music = document.getElementById('mp3');

        let playBtn = document.getElementById('playBtn');
        let playIcon = document.getElementById('playIcon');
        let isPlaying = true;
        
        playBtn.addEventListener('click', function() {
            if (isPlaying) {
                playIcon.classList.remove('fa-play');
                playIcon.classList.add('fa-pause');
                music.play();
            } else {
                playIcon.classList.remove('fa-pause');
                playIcon.classList.add('fa-play');
                music.pause();
            }
            isPlaying = !isPlaying;
        });
        </script>
    </body>
</html>
